<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:0 20px 40px 20px;
color:white;
}

/* LOGO MISMO TAMAÑO, SIN ESPACIO */
.logo{
margin:0;
padding:0;
}

.logo img{
width:650px;
max-width:100%;
display:block;
margin:0 auto;
}

/* RECUADRO SUBIDO AGRESIVO */
.card{
background:rgba(30,41,59,0.95);
width:100%;
max-width:1100px;
border-radius:25px;
padding:45px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);

/* 🔥 aquí está la magia */
margin-top:-60px; /* lo pegamos fuerte */
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h2{margin:0;}

.limpiar{
color:#ef4444;
cursor:pointer;
font-weight:600;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-weight:500;
}

input,select{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #334155;
background:#0f172a;
color:white;
font-size:14px;
}

select:invalid{
color:#94a3b8;
}

input:focus,select:focus{
outline:none;
border-color:#3b82f6;
}

.resumen{
margin-top:35px;
padding:20px;
background:#0f172a;
border-radius:15px;
border:1px solid #334155;
}

button{
margin-top:25px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.hidden{display:none;}

@media(max-width:768px){
.logo img{
width:480px;
}
.card{
margin-top:-40px;
}
}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png" alt="Momia Store">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div class="limpiar" onclick="location.reload()">Limpiar</div>
</div>

<label>Selecciona tu país:</label>
<select required>
<option value="" disabled selected hidden>Escoja una opción</option>
<option>Ecuador</option>
<option>Venezuela</option>
<option>Colombia</option>
<option>México</option>
<option>Perú</option>
<option>Argentina</option>
<option>Chile</option>
</select>

<label>Nombre:</label>
<input type="text" placeholder="Ingresa tu nombre">

<label>Tipo de cliente:</label>
<select required>
<option value="" disabled selected hidden>Tipo de cliente</option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text" placeholder="Número de teléfono">

<label>Correo electrónico:</label>
<input type="email" placeholder="Correo electrónico">

<label>Selecciona tu método de pago:</label>
<select required>
<option value="" disabled selected hidden>Forma de pago</option>
</select>

<div class="resumen">
<h3>Resumen del pedido</h3>
<div>Producto seleccionado: <strong>Black Myth: Wukong</strong></div>
<div>Precio base: 35.00 USD</div>
<div>Total a pagar: --</div>
</div>

<button>Procesar Envío</button>

</div>

</body>
</html>
