<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:50px 20px;
color:white;
}

.logo img{
width:320px;
margin-bottom:35px;
}

.card{
background:rgba(30,41,59,0.95);
width:100%;
max-width:1000px;
border-radius:25px;
padding:45px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h2{
margin:0;
}

.limpiar{
color:#ef4444;
cursor:pointer;
font-weight:600;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-weight:500;
}

input,select{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #334155;
background:#0f172a;
color:white;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border-color:#3b82f6;
}

.resumen{
margin-top:35px;
padding:20px;
background:#0f172a;
border-radius:15px;
border:1px solid #334155;
}

.resumen h3{
margin-top:0;
margin-bottom:15px;
}

button{
margin-top:25px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="logo">
<img src="logo.png" alt="Momia Store">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div class="limpiar" onclick="location.reload()">Limpiar</div>
</div>

<label>Selecciona tu país:</label>
<select id="pais" required>
<option value=""></option>
<option value="ecuador">$ USD</option>
<option value="venezuela">Bs</option>
<option value="colombia">COP</option>
<option value="mexico">MXN</option>
<option value="peru">S/</option>
<option value="argentina">ARS</option>
<option value="chile">CLP</option>
<option value="espana">€</option>
</select>

<label>Nombre:</label>
<input type="text" placeholder="Ingresa tu nombre">

<label>Tipo de cliente:</label>
<select>
<option value=""></option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text" placeholder="Número de teléfono">

<label>Correo electrónico:</label>
<input type="email" placeholder="Correo electrónico">

<label>Selecciona tu método de pago:</label>
<select id="metodo">
<option value=""></option>
<option value="transferencia">Transferencia</option>
<option value="binance">Binance</option>
</select>

<div id="comprobanteSection" class="hidden">
<label>Comprobante de pago:</label>
<input type="file">
</div>

<div class="resumen">
<h3>Resumen del pedido</h3>
<div>Producto seleccionado: <strong>Black Myth: Wukong</strong></div>
<div>Precio base: <span id="precioBase">35</span></div>
<div>Total final: <span id="precioTotal">--</span></div>
</div>

<button>Procesar Envío</button>

</div>

<script>

const pais = document.getElementById("pais");
const metodo = document.getElementById("metodo");
const precioBase = document.getElementById("precioBase");
const precioTotal = document.getElementById("precioTotal");
const comprobanteSection = document.getElementById("comprobanteSection");

let base = 35;

function actualizar(){
if(!pais.value){
precioTotal.textContent="--";
comprobanteSection.classList.add("hidden");
return;
}

comprobanteSection.classList.remove("hidden");

let total = base;

if(metodo.value==="binance"){
total = base * 1.05;
}

precioTotal.textContent = total.toFixed(2);
}

pais.addEventListener("change",actualizar);
metodo.addEventListener("change",actualizar);

</script>

</body>
</html>
