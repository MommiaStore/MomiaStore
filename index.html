<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(15px);
    padding: 50px 40px;
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

.logo {
    text-align: center;
    margin-bottom: 25px;
}

.logo img {
    width: 320px;
    display: block;
    margin: 0 auto;
}

h2 {
    text-align: center;
    color: #f1f5f9;
    font-weight: 500;
    margin-bottom: 35px;
    letter-spacing: 1px;
}

label {
    color: #cbd5e1;
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
}

input, select {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #334155;
    background-color: #0f172a;
    color: white;
    margin-bottom: 22px;
    font-size: 14px;
    transition: 0.3s ease;
}

input:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
}

button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    color: white;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(59,130,246,0.4);
}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="Momia Store">
    </div>

    <h2>Recibo de envío</h2>

    <form>

        <label>Nombre:</label>
        <input type="text" required>

        <label>Correo electrónico:</label>
        <input type="email" required>

        <label>WhatsApp:</label>
        <input type="text" required>

        <label>Selecciona tu método de pago:</label>
        <select required>
            <option value="">Elige una opción</option>
            <option>Transferencia bancaria</option>
            <option>Depósito</option>
            <option>Pago móvil</option>
        </select>

        <label>Comprobante de pago:</label>
        <input type="file" required>

        <button type="submit">Procesar envío</button>

    </form>

</div>

</body>
</html>
