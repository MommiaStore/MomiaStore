<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:0 20px 40px 20px;
color:white;
}

.logo img{
width:650px;
max-width:100%;
display:block;
margin:0 auto;
}

.card{
background:rgba(30,41,59,0.95);
width:100%;
max-width:1100px;
border-radius:25px;
padding:45px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
margin-top:-60px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.product-box{
display:flex;
gap:18px;
align-items:center;
background:#0b1328;
padding:20px;
border-radius:20px;
border:1px solid #1e293b;
margin-bottom:30px;
}

.product-box img{
width:110px;
border-radius:15px;
flex-shrink:0;
}

.product-info h3{
margin:0 0 6px 0;
font-size:20px;
line-height:1.2;
}

.product-info p{
margin:2px 0;
font-size:14px;
color:#94a3b8;
}

.price{
color:#22c55e;
font-weight:700;
font-size:16px;
margin-top:6px;
}
color:#22c55e;
font-weight:600;
}

.resumen{
margin-top:25px;
padding:20px;
background:#0f172a;
border-radius:15px;
border:1px solid #334155;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
}

input,select{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #334155;
background:#0f172a;
color:white;
}

button{
margin-top:25px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div style="color:#ef4444;cursor:pointer;" onclick="location.reload()">Limpiar</div>
</div>

<!-- TARJETA SUPERIOR DEL PRODUCTO -->
<div class="product-box hidden" id="productBox">
<img id="productoImagen">
<div class="product-info">
<h3 id="productoNombre"></h3>
<p id="tipoCuenta">Tipo: Cuenta Principal</p>
<p class="price">Precio base: <span id="precioBaseTop"></span> USD</p>
</div>
</div>

<label>Selecciona tu país:</label>
<select required>
<option value="" disabled selected hidden>Escoja una opción</option>
<option>Ecuador</option>
<option>Venezuela</option>
<option>Colombia</option>
<option>México</option>
<option>Perú</option>
<option>Argentina</option>
<option>Chile</option>
</select>

<label>Nombre:</label>
<input type="text" placeholder="Ingresa tu nombre">

<label>Tipo de cliente:</label>
<select required>
<option value="" disabled selected hidden>Tipo de cliente</option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text" placeholder="Número de teléfono">

<label>Correo electrónico:</label>
<input type="email" placeholder="Correo electrónico">

<label>Selecciona tu método de pago:</label>
<select required>
<option value="" disabled selected hidden>Forma de pago</option>
</select>

<!-- RESUMEN SIMPLE -->
<div class="resumen hidden" id="resumenBox">
<h3>Resumen del pedido</h3>
<p>Precio base: <span id="precioBaseBottom"></span> USD</p>
</div>

<button>Procesar Envío</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const producto = params.get("producto");
const precio = params.get("precio");
const imagen = params.get("imagen");

if(producto || precio || imagen){
document.getElementById("productBox").classList.remove("hidden");
document.getElementById("resumenBox").classList.remove("hidden");
}

if(producto){
document.getElementById("productoNombre").textContent = producto;
}

if(precio){
document.getElementById("precioBaseTop").textContent = precio;
document.getElementById("precioBaseBottom").textContent = precio;
}

if(imagen){
document.getElementById("productoImagen").src = imagen;
}
</script>

</body>
</html>
