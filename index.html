<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#f2f2f2;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 20px;
color:#111;
}

.logo img{
width:180px;
margin-bottom:30px;
}

.card{
background:white;
width:100%;
max-width:650px;
border-radius:20px;
padding:35px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
position:relative;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h2{
margin:0;
}

.limpiar{
color:#e11d48;
cursor:pointer;
font-weight:600;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-weight:500;
}

input,select{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
background:#f9f9f9;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border-color:#22c55e;
background:white;
}

.price-box{
margin-top:15px;
padding:12px;
background:#f4f4f4;
border-radius:10px;
font-weight:500;
}

.hidden{display:none;}

button{
margin-top:25px;
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="logo">
<img src="logo.png" alt="Momia Store">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div class="limpiar" onclick="limpiarFormulario()">Limpiar</div>
</div>

<label>Selecciona tu país:</label>
<select id="pais" required>
<option value="">Escoja una opción</option>
<option value="ecuador">Ecuador</option>
<option value="venezuela">Venezuela</option>
<option value="colombia">Colombia</option>
<option value="mexico">México</option>
<option value="peru">Perú</option>
<option value="argentina">Argentina</option>
<option value="chile">Chile</option>
<option value="espana">España</option>
</select>

<div class="price-box">
Precio base: <span id="precioBase">--</span>
</div>

<label>Nombre:</label>
<input type="text" placeholder="Ingrese el nombre">

<label>Tipo de cliente:</label>
<select>
<option>Tipo de cliente</option>
<option>PS5</option>
<option>PS4</option>
</select>

<label>WhatsApp:</label>
<input type="text" placeholder="Número de teléfono">

<label>Correo electrónico:</label>
<input type="email" placeholder="Correo electrónico">

<label>Selecciona tu método de pago:</label>
<select id="metodo">
<option value="">Forma de Pago</option>
<option value="transferencia">Transferencia</option>
<option value="binance">Binance</option>
</select>

<div class="price-box">
Total ajustado: <span id="precioTotal">--</span>
</div>

<div id="comprobanteSection" class="hidden">
<label>Comprobante de pago:</label>
<input type="file">
</div>

<button>Procesar Envío</button>

</div>

<script>

const pais = document.getElementById("pais");
const metodo = document.getElementById("metodo");
const precioBase = document.getElementById("precioBase");
const precioTotal = document.getElementById("precioTotal");
const comprobanteSection = document.getElementById("comprobanteSection");

let precios = {
ecuador:{base:35,moneda:"$"},
venezuela:{base:21000,moneda:"Bs"},
colombia:{base:140000,moneda:"COP"},
mexico:{base:650,moneda:"MXN"},
peru:{base:130,moneda:"S/"},
argentina:{base:30000,moneda:"ARS"},
chile:{base:27000,moneda:"CLP"},
espana:{base:29.75,moneda:"€"}
};

function actualizarPrecio(){
let p = pais.value;
let m = metodo.value;

if(!p){
precioBase.textContent="--";
precioTotal.textContent="--";
comprobanteSection.classList.add("hidden");
return;
}

comprobanteSection.classList.remove("hidden");

let base = precios[p].base;
let moneda = precios[p].moneda;

precioBase.textContent = moneda+" "+base;

let total = base;

if(m==="binance"){
total = base*1.05;
}

precioTotal.textContent = moneda+" "+total.toFixed(2);
}

pais.addEventListener("change",actualizarPrecio);
metodo.addEventListener("change",actualizarPrecio);

function limpiarFormulario(){
document.querySelector("form")?.reset();
pais.value="";
metodo.value="";
precioBase.textContent="--";
precioTotal.textContent="--";
comprobanteSection.classList.add("hidden");
}

</script>

</body>
</html>
