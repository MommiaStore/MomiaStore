<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:30px 20px;
color:white;
}

.logo img{
width:420px;
margin-bottom:15px;
}

.card{
background:rgba(30,41,59,0.95);
width:100%;
max-width:1100px;
border-radius:25px;
padding:45px;
box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h2{margin:0;}

.limpiar{
color:#ef4444;
cursor:pointer;
font-weight:600;
}

label{
display:block;
margin-top:18px;
margin-bottom:6px;
font-weight:500;
}

input,select{
width:100%;
padding:15px;
border-radius:12px;
border:1px solid #334155;
background:#0f172a;
color:white;
font-size:14px;
}

select:invalid{
color:#94a3b8;
}

input:focus,select:focus{
outline:none;
border-color:#3b82f6;
}

.resumen{
margin-top:35px;
padding:20px;
background:#0f172a;
border-radius:15px;
border:1px solid #334155;
}

button{
margin-top:25px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.hidden{display:none;}
.total-rojo{color:#ef4444;font-weight:bold;}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png" alt="Momia Store">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div class="limpiar" onclick="location.reload()">Limpiar</div>
</div>

<label>Selecciona tu país:</label>
<select id="pais" required>
<option value="" disabled selected hidden>Escoja una opción</option>
<option value="ecuador">Ecuador</option>
<option value="venezuela">Venezuela</option>
<option value="colombia">Colombia</option>
<option value="mexico">México</option>
<option value="peru">Perú</option>
<option value="argentina">Argentina</option>
<option value="chile">Chile</option>
<option value="espana">España</option>
</select>

<label>Nombre:</label>
<input type="text" placeholder="Ingresa tu nombre">

<label>Tipo de cliente:</label>
<select required>
<option value="" disabled selected hidden>Tipo de cliente</option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text" placeholder="Número de teléfono">

<label>Correo electrónico:</label>
<input type="email" placeholder="Correo electrónico">

<label>Selecciona tu método de pago:</label>
<select id="metodo" required>
<option value="" disabled selected hidden>Forma de pago</option>
</select>

<div id="comprobanteSection" class="hidden">
<label>Comprobante de pago:</label>
<input type="file">
</div>

<div class="resumen">
<h3>Resumen del pedido</h3>
<div>Producto seleccionado: <strong>Black Myth: Wukong</strong></div>
<div>Precio base: <span id="precioBase">35.00 USD</span></div>
<div>Total a pagar: <span id="precioTotal">--</span></div>
</div>

<button>Procesar Envío</button>

</div>

<script>

const pais = document.getElementById("pais");
const metodo = document.getElementById("metodo");
const precioTotal = document.getElementById("precioTotal");
const comprobanteSection = document.getElementById("comprobanteSection");

let baseUSD = 35;

function cargarMetodos(){
metodo.innerHTML='<option value="" disabled selected hidden>Forma de pago</option>';

if(pais.value==="ecuador"){
metodo.innerHTML+=`
<option value="pichincha">Banco Pichincha</option>
<option value="guayaquil">Banco Guayaquil</option>
<option value="bolivariano">Banco Bolivariano</option>
<option value="binance">Binance</option>
`;
}else if(pais.value!==""){
metodo.innerHTML+=`
<option value="binance">Binance</option>
<option value="paypal">PayPal</option>
`;
}

actualizar();
}

function actualizar(){

if(!pais.value || !metodo.value){
precioTotal.textContent="--";
comprobanteSection.classList.add("hidden");
return;
}

comprobanteSection.classList.remove("hidden");

let total = baseUSD;

if(metodo.value==="paypal"){
total = baseUSD * 1.065;
precioTotal.innerHTML='<span class="total-rojo">'+total.toFixed(2)+' USD</span>';
}else{
precioTotal.textContent = total.toFixed(2)+' USD';
}
}

pais.addEventListener("change",cargarMetodos);
metodo.addEventListener("change",actualizar);

</script>

</body>
</html>
