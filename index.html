<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
  body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#050b18,#0b1f3a 60%,#0a1930);
min-height:100vh;
padding:40px 40px 60px 40px;
color:#e6f0ff;
}
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#050b18,#0b1f3a 60%,#0a1930);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:0 20px 40px 20px;
color:#e6f0ff;
}

/* LOGO */
.logo img{
width:650px;
max-width:100%;
display:block;
margin:30px auto 0 auto;
filter:drop-shadow(0 0 25px rgba(0,140,255,0.35));
}

/* CARD */
.card{
background:linear-gradient(180deg,#0f1c33,#0b1628);
width:100%;
max-width:1800px;
margin: 0 auto;
border-radius:28px;
padding:55px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.product-box{
display:flex;
gap:22px;
align-items:center;
background:linear-gradient(135deg,#0a1326,#111c35);
padding:25px;
border-radius:22px;
border:1px solid rgba(59,130,246,0.2);
margin-bottom:35px;
box-shadow:0 0 35px rgba(0,140,255,0.08);
}

.product-box img{
width:120px;
border-radius:18px;
flex-shrink:0;
}

.product-info h3{
margin:0 0 8px 0;
font-size:22px;
color:#ffffff;
}

.price{
color:#3b82f6;
font-weight:700;
font-size:17px;
}

label{
display:block;
margin-top:22px;
margin-bottom:8px;
color:#c7dbff;
}

input,select{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(59,130,246,0.25);
background:#0c162a;
color:#ffffff;
font-size:15px;
}

.hidden{display:none;}

.caja-metodo{
margin-top:20px;
padding:20px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

.resumen{
margin-top:30px;
padding:25px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

.linea-separadora{
height:1px;
background:linear-gradient(to right,transparent,rgba(255,255,255,0.25),transparent);
margin:12px 0 18px 0;
}

.totalFinal{
color:#ff1a1a;
font-size:22px;
font-weight:800;
}

button{
margin-top:35px;
width:100%;
padding:20px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

/* ================= MOBILE OPTIMIZATION ================= */
@media (max-width:768px){

.logo img{
width:220px;
margin:20px auto 10px auto;
}

.card{
padding:25px 20px;
margin-top:-20px;
}

.header{
margin-bottom:20px;
}

.product-box{
padding:18px;
gap:15px;
margin-bottom:20px;
}

.product-box img{
width:85px;
}

.product-info h3{
font-size:18px;
}

label{
margin-top:16px;
margin-bottom:6px;
}

input,select{
padding:14px;
font-size:14px;
}

.resumen{
padding:18px;
margin-top:20px;
}

button{
padding:16px;
font-size:16px;
}

}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<form action="https://formsubmit.co/axxell.klk@gmail.com" method="POST" enctype="multipart/form-data">
<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div onclick="location.reload()" style="cursor:pointer;">Limpiar</div>
<input type="hidden" name="_captcha" value="false">
</div>

<div id="productBox" class="product-box hidden">
<img id="productoImagen" src="">
<div class="product-info">
<h3 id="productoNombre"></h3>
<p>Tipo: Cuenta Principal</p>
<p class="price">
Precio: 
<span id="precioBaseTop"></span> 
<span id="monedaTop"></span>
</p>
</div>
</div>

<label>Selecciona tu país:</label>
<select id="paisSelector" name="País">
<option value="" disabled selected hidden>Escoja una opción</option>
<option value="Ecuador">Ecuador</option>
<option value="Venezuela">Venezuela</option>
<option value="Colombia">Colombia</option>
<option value="México">México</option>
<option value="Perú">Perú</option>
<option value="Argentina">Argentina</option>
<option value="Chile">Chile</option>
</select>

<label>Nombre:</label>
<input type="text" name="Nombre" placeholder="Ingresa tu nombre">

<label>Tipo de cliente:</label>
<select name="Tipo de cliente">
<option value="" disabled selected hidden>Seleccione tipo de cliente</option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text" name="WhatsApp" placeholder="+000 99 123 4567">

<label>Correo electrónico:</label>
<input type="email" name="Correo" placeholder="ejemplo@correo.com">

<label>Forma de pago:</label>
<select id="metodoPago" name="Método de pago">
<option value="" disabled selected hidden>Seleccione método de pago</option>
</select>

<div id="datosPago" class="hidden caja-metodo"></div>

<div id="comprobanteBox" class="hidden">
<label>Adjuntar comprobante:</label>
<input type="file" name="Comprobante">
</div>

<div class="resumen hidden" id="resumenBox">
<h3>Resumen del pedido</h3>
<p id="precioBaseLinea"></p>
<div class="linea-separadora"></div>
<p id="comisionLinea" class="hidden"></p>
<p class="totalFinal" id="totalFinal"></p>
</div>

<button type="submit">Proceder con el envío</button>
</div>
</form>
<script>
document.addEventListener("DOMContentLoaded", function() {

const params = new URLSearchParams(window.location.search);
const producto = params.get("producto");
const precio = parseFloat(params.get("precio")) || 0;
const imagen = params.get("imagen");

let precioBase = precio;
let moneda = "USD";

const tasas = {
Venezuela:36,
Colombia:4000,
México:17,
Perú:3.8,
Argentina:900,
Chile:900
};

if(producto && precio){
document.getElementById("productBox").classList.remove("hidden");
document.getElementById("resumenBox").classList.remove("hidden");
document.getElementById("productoNombre").textContent = producto;
document.getElementById("precioBaseTop").textContent = precio.toFixed(2);
document.getElementById("monedaTop").textContent = moneda;
if(imagen){
document.getElementById("productoImagen").src = imagen;
}
}

function actualizarResumen(){
document.getElementById("precioBaseTop").textContent = precioBase.toFixed(2);
document.getElementById("monedaTop").textContent = moneda;
document.getElementById("precioBaseLinea").textContent =
"Precio base: " + precioBase.toFixed(2) + " " + moneda;
document.getElementById("totalFinal").textContent =
"Total a pagar: " + precioBase.toFixed(2) + " " + moneda;
}

actualizarResumen();

document.getElementById("paisSelector").addEventListener("change", function(){

const metodoPago = document.getElementById("metodoPago");
const comisionLinea = document.getElementById("comisionLinea");

comisionLinea.classList.add("hidden");
comisionLinea.textContent = "";
metodoPago.selectedIndex = 0;
document.getElementById("datosPago").classList.add("hidden");
document.getElementById("comprobanteBox").classList.add("hidden");

precioBase = precio;
metodoPago.innerHTML='<option value="" disabled selected hidden>Seleccione método de pago</option>';

if(this.value==="Ecuador"){
moneda="USD";
precioBase=precio;
metodoPago.innerHTML+=`
<option value="guayaquil">Banco Guayaquil</option>
<option value="pichincha">Banco Pichincha</option>
<option value="bolivariano">Banco Bolivariano</option>`;
}else{
moneda={
Venezuela:"VES",
Colombia:"COP",
México:"MXN",
Perú:"PEN",
Argentina:"ARS",
Chile:"CLP"
}[this.value];
precioBase=precio*tasas[this.value];
metodoPago.innerHTML+=`
<option value="binance">Binance</option>
<option value="paypal">PayPal</option>`;
}

actualizarResumen();
});

document.getElementById("metodoPago").addEventListener("change",function(){

const datosPago = document.getElementById("datosPago");
const comisionLinea = document.getElementById("comisionLinea");
const totalFinal = document.getElementById("totalFinal");
const pais = document.getElementById("paisSelector").value;

datosPago.classList.remove("hidden");
document.getElementById("comprobanteBox").classList.remove("hidden");
comisionLinea.classList.add("hidden");
comisionLinea.textContent="";

if(this.value==="paypal"){

let comision = precio * 0.065;
let totalUSD = precio + comision;

comisionLinea.classList.remove("hidden");
comisionLinea.textContent = "Comisión PayPal (6.5%): " + comision.toFixed(2) + " USD";

if(pais!=="Ecuador"){
let equivalente=totalUSD*tasas[pais];
totalFinal.innerHTML=
"Equivalente aproximado: "+equivalente.toFixed(2)+" "+moneda+
"<br><br><span class='totalFinal'>TOTAL A PAGAR: "+totalUSD.toFixed(2)+" USD</span>";
}else{
totalFinal.textContent="Total a pagar: "+totalUSD.toFixed(2)+" USD";
}

}else if(this.value==="binance"){

let totalUSD=precio;

if(pais!=="Ecuador"){
totalFinal.innerHTML=
"Equivalente en USD: "+totalUSD.toFixed(2)+" USD"+
"<br><br><span class='totalFinal'>TOTAL A PAGAR: "+totalUSD.toFixed(2)+" USD</span>";
}else{
totalFinal.textContent="Total a pagar: "+totalUSD.toFixed(2)+" USD";
}

}else{
totalFinal.textContent="Total a pagar: "+precioBase.toFixed(2)+" "+moneda;
}

if(this.value==="guayaquil"){
datosPago.innerHTML=`<strong>Detalles del método seleccionado</strong><br>
Boada Acurio Jeamileth Abigail<br>
Cuenta Ahorros: 0047261389<br>
Cédula: 1753616547`;
}

if(this.value==="pichincha"){
datosPago.innerHTML=`<strong>Detalles del método seleccionado</strong><br>
Boada Acurio Jeamileth Abigail<br>
Cuenta Ahorros: 2212341155<br>
Cédula: 1753616547`;
}

if(this.value==="bolivariano"){
datosPago.innerHTML=`<strong>Detalles del método seleccionado</strong><br>
Boada Acurio Jeamileth Abigail<br>
Cuenta Ahorros: 0031425755<br>
Cédula: 1753616547`;
}

if(this.value==="binance"){
datosPago.innerHTML=`<strong>Detalles del método seleccionado</strong><br>
Correo: adonis.klk@icloud.com<br>
ID: 1021396902`;
}

if(this.value==="paypal"){
datosPago.innerHTML=`<strong>Detalles del método seleccionado</strong><br>
Escribe al WhatsApp +593 99 528 5372 para procesar el pago.`;
}

});

});
</script>

</body>
</html>
