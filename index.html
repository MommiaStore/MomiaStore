<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e293b;
    padding: 40px;
    border-radius: 15px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.logo {
    text-align: center;
    margin-bottom: 20px;
}

.logo img {
    width: 250px;
}

h2 {
    text-align: center;
    color: white;
    margin-bottom: 25px;
}

label {
    color: #cbd5e1;
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
}

input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.jpg" alt="Momia Store">
    </div>

    <h2>Recibo de envío</h2>

    <form>

        <label>Nombre:</label>
        <input type="text" required>

        <label>Correo electrónico:</label>
        <input type="email" required>

        <label>WhatsApp:</label>
        <input type="text" required>

        <label>Selecciona tu método de pago:</label>
        <select required>
            <option value="">Elige una opción</option>
            <option>Transferencia</option>
            <option>Depósito</option>
            <option>Pago móvil</option>
        </select>

        <label>Comprobante de pago:</label>
        <input type="file" required>

        <button type="submit">Procesar Envío</button>

    </form>

</div>

</body>
</html>
