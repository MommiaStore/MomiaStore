<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#050b18,#0b1f3a 60%,#0a1930);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:0 20px 40px 20px;
color:#e6f0ff;
}

.logo img{
width:650px;
max-width:100%;
display:block;
margin:30px auto 0 auto;
filter:drop-shadow(0 0 25px rgba(0,140,255,0.35));
}

.card{
background:linear-gradient(180deg,#0f1c33,#0b1628);
width:100%;
max-width:1100px;
border-radius:28px;
padding:55px;
box-shadow:0 30px 80px rgba(0,0,0,0.7),0 0 60px rgba(0,140,255,0.15);
margin-top:-40px;
border:1px solid rgba(0,140,255,0.15);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.product-box{
display:flex;
gap:22px;
align-items:center;
background:linear-gradient(135deg,#0a1326,#111c35);
padding:25px;
border-radius:22px;
border:1px solid rgba(59,130,246,0.2);
margin-bottom:35px;
box-shadow:0 0 35px rgba(0,140,255,0.08);
}

.product-box img{
width:120px;
border-radius:18px;
flex-shrink:0;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.product-info h3{
margin:0 0 8px 0;
font-size:22px;
color:#ffffff;
}

.product-info p{
margin:4px 0;
font-size:14px;
color:#9db4d4;
}

.price{
color:#3b82f6;
font-weight:700;
font-size:17px;
margin-top:8px;
}

label{
display:block;
margin-top:22px;
margin-bottom:8px;
font-weight:500;
color:#c7dbff;
}

input,select{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(59,130,246,0.25);
background:#0c162a;
color:#ffffff;
font-size:15px;
}

.hidden{display:none;}

.resumen{
margin-top:30px;
padding:25px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

.resumen hr{
border:none;
height:1px;
background:rgba(255,255,255,0.1);
margin:15px 0;
}

.totalFinal{
color:#ef4444;
font-size:22px;
font-weight:800;
}

button{
margin-top:35px;
width:100%;
padding:20px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
box-shadow:0 0 25px rgba(59,130,246,0.5);
}

</style>
</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div onclick="location.reload()">Limpiar</div>
</div>

<div class="product-box hidden" id="productBox">
<img id="productoImagen">
<div class="product-info">
<h3 id="productoNombre"></h3>
<p>Tipo: Cuenta Principal</p>
<p class="price">Precio base: <span id="precioBaseTop"></span> <span id="monedaTop">USD</span></p>
</div>
</div>

<label>Selecciona tu país:</label>
<select id="paisSelector">
<option value="" disabled selected hidden>Escoja una opción</option>
<option value="Ecuador">Ecuador</option>
<option value="Venezuela">Venezuela</option>
<option value="Colombia">Colombia</option>
<option value="México">México</option>
<option value="Perú">Perú</option>
<option value="Argentina">Argentina</option>
<option value="Chile">Chile</option>
</select>

<label>Nombre:</label>
<input type="text">

<label>Tipo de cliente:</label>
<select>
<option value="" disabled selected hidden>Tipo de cliente</option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text">

<label>Correo electrónico:</label>
<input type="email">

<label>Forma de pago:</label>
<select id="metodoPago">
<option value="" disabled selected hidden>Seleccione método</option>
</select>

<div id="datosPago" class="hidden" style="margin-top:20px;"></div>

<div id="comprobanteBox" class="hidden">
<label>Adjuntar comprobante:</label>
<input type="file">
</div>

<div class="resumen hidden" id="resumenBox">
<h3>Resumen del pedido</h3>
<p>Precio base: <span id="precioBaseBottom"></span> <span id="monedaBottom">USD</span></p>
<p id="comisionLinea" class="hidden" style="color:#ef4444;">
Comisión PayPal: <span id="comisionValor"></span>
</p>
<hr>
<p class="totalFinal">
Total a pagar: <span id="totalFinal"></span>
</p>
</div>

<button>Proceder con el envío</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const producto = params.get("producto");
const precio = parseFloat(params.get("precio")) || 0;
const imagen = params.get("imagen");

const productBox = document.getElementById("productBox");
const resumenBox = document.getElementById("resumenBox");
const paisSelector = document.getElementById("paisSelector");
const metodoPago = document.getElementById("metodoPago");

let moneda = "USD";
let precioBase = precio;

if(producto){
productBox.classList.remove("hidden");
resumenBox.classList.remove("hidden");
document.getElementById("productoNombre").textContent = producto;
document.getElementById("precioBaseTop").textContent = precioBase.toFixed(2);
document.getElementById("precioBaseBottom").textContent = precioBase.toFixed(2);
document.getElementById("totalFinal").textContent = precioBase.toFixed(2) + " USD";
if(imagen){document.getElementById("productoImagen").src = imagen;}
}

paisSelector.addEventListener("change",function(){

metodoPago.innerHTML='<option value="" disabled selected hidden>Seleccione método</option>';

if(this.value==="Ecuador"){
metodoPago.innerHTML+=`
<option value="guayaquil">Banco Guayaquil</option>
<option value="pichincha">Banco Pichincha</option>
<option value="bolivariano">Banco Bolivariano</option>
`;
moneda="USD";
}
else{
metodoPago.innerHTML+=`
<option value="binance">Binance</option>
<option value="paypal">PayPal</option>
`;
moneda="USD";
}

document.getElementById("monedaTop").textContent=moneda;
document.getElementById("monedaBottom").textContent=moneda;
document.getElementById("totalFinal").textContent=precioBase.toFixed(2)+" "+moneda;
});
metodoPago.addEventListener("change",function(){

let total = precioBase;
const datosPago = document.getElementById("datosPago");
const comprobanteBox = document.getElementById("comprobanteBox");

datosPago.classList.remove("hidden");
comprobanteBox.classList.remove("hidden");
document.getElementById("comisionLinea").classList.add("hidden");

/* =========================
   COMISIÓN PAYPAL
========================= */

if(this.value==="paypal"){
let comision = precioBase * 0.065;
total = precioBase + comision;
document.getElementById("comisionLinea").classList.remove("hidden");
document.getElementById("comisionValor").textContent = comision.toFixed(2) + " " + moneda;
}

/* =========================
   ACTUALIZAR TOTAL
========================= */

document.getElementById("totalFinal").textContent = total.toFixed(2) + " " + moneda;

/* =========================
   MOSTRAR DATOS SEGÚN MÉTODO
========================= */

if(this.value==="guayaquil"){
datosPago.innerHTML = `
<strong>Banco Guayaquil</strong><br><br>
Titular: Boada Acurio Jeamileth Abigail<br>
Cuenta Ahorros: 0047261389<br>
Cédula: 1753616547<br><br>
⚠️ Es obligatorio colocar el correo <strong>axxell.klk@gmail.com</strong> al realizar la transferencia para verificación inmediata.
`;
}

if(this.value==="pichincha"){
datosPago.innerHTML = `
<strong>Banco Pichincha</strong><br><br>
Titular: Boada Acurio Jeamileth Abigail<br>
Cuenta Ahorros: 2212341155<br>
Cédula: 1753616547<br><br>
⚠️ Es obligatorio colocar el correo <strong>axxell.klk@gmail.com</strong>  al realizar la transferencia para verificación inmediata.
`;
}

if(this.value==="bolivariano"){
datosPago.innerHTML = `
<strong>Banco Bolivariano</strong><br><br>
Titular: Boada Acurio Jeamileth Abigail<br>
Cuenta Ahorros: 0031425755<br>
Cédula: 1753616547<br><br>
⚠️ Es obligatorio colocar el correo <strong>axxell.klk@gmail.com</strong>  al realizar la transferencia para verificación inmediata.
`;
}

if(this.value==="binance"){
datosPago.innerHTML = `
<strong>Binance (USDT)</strong><br><br>
USDT<br>
Correo: adonis.klk@icloud.com<br>
ID BINANCE: 1021396902.<br>
Luego adjuntar comprobante.
`;
}

if(this.value==="paypal"){
datosPago.innerHTML = `
<strong>PayPal</strong><br><br>
Correo PayPal: <strong>axxell.klk@gmail.com</strong><br>
Se aplica comisión del 6.5%.<br>
El total mostrado ya incluye la comisión.
`;
}

});

</script>

</body>
</html>
