<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050b18">
<title>Recibo de envío | Momia Store</title>

<style>
html{
background:#050b18;
height:100%;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#050b18,#0b1f3a 60%,#0a1930);
min-height:100dvh; /* FIX REAL PARA SAFARI */
padding:0 20px 40px 20px;
color:#e6f0ff;
}

/* Evita rebote blanco en iOS */
html, body{
overscroll-behavior:none;
}

*{box-sizing:border-box;}

/* LOGO */
.logo img{
width:650px;
max-width:100%;
display:block;
margin:30px auto 0 auto;
filter:drop-shadow(0 0 25px rgba(0,140,255,0.35));
}

/* CARD */
.card{
background:linear-gradient(180deg,#0f1c33,#0b1628);
width:100%;
max-width:1600px;
margin: 0 auto;
border-radius:28px;
padding:55px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.product-box{
display:flex;
gap:22px;
align-items:center;
background:linear-gradient(135deg,#0a1326,#111c35);
padding:25px;
border-radius:22px;
border:1px solid rgba(59,130,246,0.2);
margin-bottom:35px;
box-shadow:0 0 35px rgba(0,140,255,0.08);
}

.product-box img{
width:120px;
border-radius:18px;
flex-shrink:0;
}

.product-info h3{
margin:0 0 8px 0;
font-size:22px;
color:#ffffff;
}

.price{
color:#3b82f6;
font-weight:700;
font-size:17px;
}

label{
display:block;
margin-top:22px;
margin-bottom:8px;
color:#c7dbff;
}

input,select{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(59,130,246,0.25);
background:#0c162a;
color:#ffffff;
font-size:15px;
}

.hidden{display:none;}

.caja-metodo{
margin-top:20px;
padding:20px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

.resumen{
margin-top:30px;
padding:25px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

.linea-separadora{
height:1px;
background:linear-gradient(to right,transparent,rgba(255,255,255,0.25),transparent);
margin:12px 0 18px 0;
}

.totalFinal{
color:#ff1a1a;
font-size:22px;
font-weight:800;
}

button{
margin-top:35px;
width:100%;
padding:20px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

/* ================= MOBILE ================= */
@media (max-width:768px){

.logo img{
width:220px;
margin:20px auto 10px auto;
}

.card{
padding:25px 20px;
margin-top:-20px;
}

.header{
margin-bottom:20px;
}

.product-box{
padding:18px;
gap:15px;
margin-bottom:20px;
}

.product-box img{
width:85px;
}

.product-info h3{
font-size:18px;
}

label{
margin-top:16px;
margin-bottom:6px;
}

input,select{
padding:14px;
font-size:14px;
}

.resumen{
padding:18px;
margin-top:20px;
}

button{
padding:16px;
font-size:16px;
}

}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<form action="https://formsubmit.co/axxell.klk@gmail.com" method="POST" enctype="multipart/form-data">
<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div onclick="location.reload()" style="cursor:pointer;">Limpiar</div>
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://momiastore.github.io/MomiaStore/gracias.html">
</div>

<!-- RESTO DEL CÓDIGO EXACTAMENTE IGUAL -->
