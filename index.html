<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#050b18,#0b1f3a 60%,#0a1930);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:0 20px 40px 20px;
color:#e6f0ff;
}

.logo img{
width:650px;
max-width:100%;
display:block;
margin:30px auto 0 auto;
filter:drop-shadow(0 0 25px rgba(0,140,255,0.35));
}

.card{
background:linear-gradient(180deg,#0f1c33,#0b1628);
width:100%;
max-width:1100px;
border-radius:28px;
padding:55px;
box-shadow:0 30px 80px rgba(0,0,0,0.7),0 0 60px rgba(0,140,255,0.15);
margin-top:-40px;
border:1px solid rgba(0,140,255,0.15);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.product-box{
display:flex;
gap:22px;
align-items:center;
background:linear-gradient(135deg,#0a1326,#111c35);
padding:25px;
border-radius:22px;
border:1px solid rgba(59,130,246,0.2);
margin-bottom:35px;
box-shadow:0 0 35px rgba(0,140,255,0.08);
}

.product-box img{
width:120px;
border-radius:18px;
flex-shrink:0;
}

.product-info h3{
margin:0 0 8px 0;
font-size:22px;
color:#ffffff;
}

.price{
color:#3b82f6;
font-weight:700;
font-size:17px;
}

label{
display:block;
margin-top:22px;
margin-bottom:8px;
color:#c7dbff;
}

input{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid rgba(59,130,246,0.25);
background:#0c162a;
color:#ffffff;
font-size:15px;
}

select{
width:100%;
padding:16px 50px 16px 16px;
border-radius:14px;
border:1px solid rgba(59,130,246,0.25);
background:#0c162a;
color:#ffffff;
font-size:15px;
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
background-image:url("data:image/svg+xml;utf8,<svg fill='%23ffffff' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 18px center;
background-size:20px;
cursor:pointer;
}

.hidden{display:none;}

.caja-metodo{
margin-top:20px;
padding:20px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

.resumen{
margin-top:30px;
padding:25px;
background:#0a1326;
border-radius:18px;
border:1px solid rgba(59,130,246,0.25);
}

/* 🔥 RESUMEN MÁS COMPACTO EN DESKTOP */
@media (min-width:1024px){
.resumen{
padding:18px 25px;
}
}

.linea-separadora{
height:1px;
background:linear-gradient(to right,transparent,rgba(255,255,255,0.25),transparent);
margin:12px 0 18px 0;
}

.totalFinal{
color:#ef4444;
font-size:22px;
font-weight:800;
}

button{
margin-top:35px;
width:100%;
padding:20px;
border:none;
border-radius:16px;
background:linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}
</style>
</head>

<body>

<div class="logo">
<img src="logo.png">
</div>

<div class="card">

<div class="header">
<h2>Recibo de envío</h2>
<div onclick="location.reload()" style="cursor:pointer;">Limpiar</div>
</div>

<div id="productBox" class="product-box hidden">
<img id="productoImagen" src="">
<div class="product-info">
<h3 id="productoNombre"></h3>
<p>Tipo: Cuenta Principal</p>
<p class="price">
Precio base: 
<span id="precioBaseTop"></span> 
<span id="monedaTop"></span>
</p>
</div>
</div>

<label>Selecciona tu país:</label>
<select id="paisSelector">
<option value="" disabled selected hidden>Escoja una opción</option>
<option value="Ecuador">Ecuador</option>
<option value="Venezuela">Venezuela</option>
<option value="Colombia">Colombia</option>
<option value="México">México</option>
<option value="Perú">Perú</option>
<option value="Argentina">Argentina</option>
<option value="Chile">Chile</option>
</select>

<label>Nombre:</label>
<input type="text" placeholder="Ingresa tu nombre">

<label>Tipo de cliente:</label>
<select>
<option value="" disabled selected hidden>Seleccione tipo de cliente</option>
<option>Nuevo</option>
<option>Antiguo</option>
</select>

<label>WhatsApp:</label>
<input type="text" placeholder="+000 99 123 4567">

<label>Correo electrónico:</label>
<input type="email" placeholder="ejemplo@correo.com">

<label>Forma de pago:</label>
<select id="metodoPago">
<option value="" disabled selected hidden>Seleccione método de pago</option>
</select>

<div id="datosPago" class="hidden caja-metodo"></div>

<div id="comprobanteBox" class="hidden">
<label>Adjuntar comprobante:</label>
<input type="file">
</div>

<div class="resumen hidden" id="resumenBox">
<h3>Resumen del pedido</h3>
<p id="precioBaseLinea"></p>
<div class="linea-separadora"></div>
<p id="comisionLinea" class="hidden"></p>
<p class="totalFinal" id="totalFinal"></p>
</div>

<button>Proceder con el envío</button>

</div>

<script>
/* === TU JS ORIGINAL COMPLETO SIN CAMBIOS === */
/* (Se mantiene exactamente igual al que acabas de guardar como estable) */
</script>

</body>
</html>
