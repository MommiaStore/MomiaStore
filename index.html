<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo de envío | Momia Store</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:60px 20px;
color:white;
}

.main-logo img{
width:450px;
max-width:95%;
margin-bottom:40px;
}

.container{
background:rgba(30,41,59,0.95);
padding:50px;
border-radius:22px;
width:100%;
max-width:850px;
box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

h2{
margin-bottom:10px;
}

.sub-info{
color:#94a3b8;
margin-bottom:30px;
}

.section-title{
margin-top:30px;
margin-bottom:10px;
font-weight:500;
}

input,select{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #334155;
background:#0f172a;
color:white;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.price-box{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #334155;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="main-logo">
<img src="logo.png" alt="Momia Store">
</div>

<div class="container">

<h2>Recibo de envío</h2>
<div class="sub-info">Verifica los detalles antes de enviar</div>

<div class="section-title">Productos seleccionados</div>

<select id="categoria">
<option value="">Selecciona categoría</option>
<option value="PS5">PS5</option>
<option value="PS4">PS4</option>
</select>

<div class="section-title">Selecciona tu país</div>

<select id="pais">
<option value="">Selecciona tu país</option>
<option value="ecuador">Ecuador</option>
<option value="venezuela">Venezuela</option>
<option value="colombia">Colombia</option>
<option value="mexico">México</option>
<option value="peru">Perú</option>
<option value="argentina">Argentina</option>
<option value="chile">Chile</option>
<option value="espana">España</option>
</select>

<div class="price-box" id="precioBox">
Precio base: <span id="precioTexto">--</span>
</div>

<div class="section-title">Método de pago</div>

<select id="metodo">
<option value="">Selecciona método</option>
<option value="transferencia">Transferencia</option>
<option value="binance">Binance</option>
</select>

<div class="price-box">
Total ajustado: <span id="totalTexto">--</span>
</div>

<div id="comprobanteSection" class="hidden">
<div class="section-title">Adjuntar comprobante</div>
<input type="file">
</div>

<button>Procesar envío</button>

</div>

<script>

const pais = document.getElementById("pais");
const metodo = document.getElementById("metodo");
const precioTexto = document.getElementById("precioTexto");
const totalTexto = document.getElementById("totalTexto");
const comprobanteSection = document.getElementById("comprobanteSection");

let precios = {
ecuador: {base:35, moneda:"$"},
venezuela: {base:21000, moneda:"Bs"},
colombia: {base:140000, moneda:"COP"},
mexico: {base:650, moneda:"MXN"},
peru: {base:130, moneda:"S/"},
argentina: {base:30000, moneda:"ARS"},
chile: {base:27000, moneda:"CLP"},
espana: {base:29.75, moneda:"€"}
};

function actualizarPrecio(){

let paisSeleccionado = pais.value;
let metodoSeleccionado = metodo.value;

if(!paisSeleccionado){
precioTexto.textContent="--";
totalTexto.textContent="--";
comprobanteSection.classList.add("hidden");
return;
}

comprobanteSection.classList.remove("hidden");

let base = precios[paisSeleccionado].base;
let moneda = precios[paisSeleccionado].moneda;

precioTexto.textContent = moneda + " " + base;

let total = base;

if(metodoSeleccionado === "binance"){
total = base * 1.05;
}

totalTexto.textContent = moneda + " " + total.toFixed(2);

}

pais.addEventListener("change", actualizarPrecio);
metodo.addEventListener("change", actualizarPrecio);

</script>

</body>
</html>
