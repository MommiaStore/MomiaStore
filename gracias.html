<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050b18">
<title>Compra confirmada | Momia Store</title>

<style>

html{
    background:#050b18;
    height:100%;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:linear-gradient(135deg,#050b18,#0b1f3a 60%,#0a1930);
    min-height:100dvh;
    color:#e6f0ff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Safari fix */
html, body{
    overscroll-behavior:none;
}

.card{
    background:linear-gradient(180deg,#0f1c33,#0b1628);
    padding:50px;
    border-radius:25px;
    max-width:650px;
    width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    text-align:left;
}

h1{
    color:#3b82f6;
    margin-bottom:25px;
    font-size:32px;
}

p{
    line-height:1.6;
    color:#dbe6ff;
    font-size:16px;
}

.boton{
    display:inline-block;
    margin-top:30px;
    padding:16px 35px;
    border-radius:14px;
    background:linear-gradient(90deg,#1d4ed8,#2563eb,#3b82f6);
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.boton:hover{
    opacity:0.9;
}

/* MOBILE */
@media (max-width:768px){

body{
    align-items:flex-start;
    padding-top:60px;
}

.card{
    padding:30px;
    border-radius:20px;
}

h1{
    font-size:24px;
}

}

</style>
</head>

<body>

<div class="card">
<h1>¡Compra recibida con éxito!</h1>

<p>
Hemos recibido tu comprobante correctamente.
<br><br>
Nuestro equipo está verificando tu transacción. 
En breve recibirás confirmación vía WhatsApp o correo electrónico.
</p>

<a href="https://momiastore.com" class="boton">
Volver a la tienda
</a>

</div>

</body>
</html>
